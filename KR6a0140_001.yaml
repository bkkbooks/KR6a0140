body:
  text: 後漢外國三藏康孟詳譯聞如是一時釋氏舍夷阿摩勒藥樹園爾時賢者舍利弗摩訶目乾連比丘遊行諸國經歷一年與大比丘衆俱比丘五百還至藥樹欲見世尊是等來還比丘衆多各共語言各各著衣持鉢其聲高大音響暢逸佛以預知問賢者阿難此何比丘揚大音聲其響洋逸如捕魚師揚聲驗逸阿難白佛唯然世尊舍利弗目乾連遊止諸國經歷一載大比丘衆五百人俱至於藥樹見諸比丘各各談語著衣持鉢語言聲高音響暢溢佛語阿難勿令比丘來至吾許阿難白佛唯然奉命從座起稽首佛足繞佛三匝而退往詣舍利弗目連比丘所言語敘閙却住一面謂賢者舍利弗目連令餘比丘勿詣佛所世尊有教舍利弗目連聞阿難言即從坐起往詣佛所稽首足下繞佛三匝速去衣鉢出詣藥樹與比丘衆俱爾時釋種諸優婆塞悉聚會有所講一義遙見舍利弗大目連比丘衆俱著衣持鉢晝日平旦詣於藥樹下五百比丘衆俱吾等寧可往問起居時諸釋種優婆塞衆即起速往詣舍利弗目連所前稽首足下却住一面時諸清信士問舍利弗目連何故著衣持鉢晝日而往於藥樹間舍利弗目連答釋種清信士吾等遊諸國來還詣比丘衆皆以疲倦今此露住諸清信士答曰唯諸賢者吾等於斯具足施坐然燈為明唯願屈神及比丘衆若謂佛者乃可捨退賢者舍利弗大目乾連默然可之尋往所施坐其床榻則入其室與衆僧俱坐爾時釋種諸清信士往詣佛所稽首足下叉手白佛我等請求世尊求哀安住唯然大聖信比丘衆所以者何於彼比丘諸漏盡者已得羅漢所作已辦吾不懷疑此等比丘亦不猶豫其有比丘幼小新學初出家者入是法律未久其心移易或能變異譬如世間暴水卒來無所遮隔如是世尊新學比丘初出家者入是法律未久其心移易或能變異不覲大聖恐改志行於時梵天忽然來下即住佛前叉手白言我等請求世尊求哀安住唯然大聖信比丘衆所以者何於衆比丘諸漏盡者已得羅漢所作已辦吾不疑此等比丘亦不猶豫其有比丘幼小新學初出家者入是法律未久其心移易或能變異佛即然可梵天王賢者摩訶目乾連天眼徹視遙見佛心可之請求覩大聖德如大枰閣若大講堂淨潔塗治開諸軒窗日東初出入于軒窗光照西壁賢者目連天眼徹視遙見世尊相好巍巍時目乾連尋語比丘衆諸賢者當起著衣持鉢梵天請求諸幼小各詣比丘曰唯當受教速正衣服隨舍利弗大目連等往詣佛所稽首足下退坐一面於時世尊告舍利弗吾亦前世供比丘衆於心云何舍利弗心自念言世尊宿世供比丘衆於此大聖比丘質朴於求望知節行安常志精進佛天中天則為法王調諸不調然當受教諸比丘衆舉動輕飄今日大聖慈愍衆僧佛言善哉善哉舍利弗正當念此蠲除惡念所以者何誰為比丘衆去諸重擔唯如來耳無所不住及舍利弗摩訶目乾連時佛告大目連曰於心云何誰敬比丘衆誰制比丘衆我心念言今佛世尊敬制比丘衆唯然大聖此比丘衆或有質朴少求知足或不能者自謂行安精進無懈如來法王自應當然吾亦如是佛言且止勿有斯念當更異念所以者何於是目連誰能堪任去諸重擔唯如來耳及舍利弗大目乾連以信渡流泛無放逸為船聖諦濟苦患智慧究竟渡佛分別是語時六十比丘漏盡意解無數比丘遠塵離垢諸法眼生佛説如是諸比丘清信士天龍鬼神莫不歡喜
